name: reusable
on: 
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
        default: dist
    outputs:
      result:
        description: 'The result of deployment'
        value: ${{ jobs.deploy.outputs.outcome }}
jobs:
  deploy:
    outputs:
      outcome: ${{ steps.set_result.outputs.result }}
    runs-on: ubuntu-latest
    steps:
    - name: Get build artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
    - name: Deploy
      run: echo "Deploying..."
    - name: Set result output
      id: set_result
      run: echo "result=Deployment Successful" >> $GITHUB_OUTPUT