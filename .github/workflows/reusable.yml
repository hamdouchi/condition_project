name: reusable workflow
on: 
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
        default: dist
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Get build artifacts
      uses: actions/download-artifact@v3
      with:
        name: ${{ inputs.artifact-name }}
    - name: Deploy
      run: echo "Deploying..."